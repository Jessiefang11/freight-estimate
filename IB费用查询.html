<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freight Estimate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:24px 20px}
header{text-align:center;margin-bottom:32px}
.logo-row{margin-bottom:16px}
.logo{width:180px;height:auto}
h1{font-size:24px;font-weight:700;color:#003366;margin-bottom:4px}
.subtitle{font-size:14px;color:#607080;letter-spacing:.5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.field{display:flex;flex-direction:column}
.field label{font-size:13px;font-weight:600;color:#334155;margin-bottom:6px}
.req{color:#e53e3e}.opt{color:#94a3b8;font-weight:400;font-size:12px}.hint{color:#94a3b8;font-weight:400;font-size:11px}
.field input{padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;transition:border .2s;background:#fff}
.field input:focus{outline:none;border-color:#003366;box-shadow:0 0 0 3px rgba(0,51,102,.1)}
button#calcBtn{width:100%;padding:12px;background:#003366;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
button#calcBtn:hover{background:#004488}
.results{margin-top:28px}
.results h2{font-size:17px;color:#003366;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.result-card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e2e8f0;transition:transform .15s}
.result-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card-title{font-size:13px;color:#607080;font-weight:600;margin-bottom:8px}
.card-value{font-size:22px;font-weight:700;color:#003366}
.card-value.error{font-size:14px;color:#e53e3e;font-weight:500}
.card-detail{font-size:11px;color:#94a3b8;margin-top:6px;line-height:1.5}
.hidden{display:none}
footer{margin-top:40px;text-align:center;font-size:12px;color:#94a3b8}
@media(max-width:540px){.form-grid,.result-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <svg class="logo" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="50" rx="6" fill="#003366"/>
        <text x="100" y="22" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Arial">SSG - ISS</text>
        <text x="100" y="38" text-anchor="middle" fill="#8bb8e8" font-size="9" font-family="Arial">Supply Chain Solutions</text>
      </svg>
    </div>
    <h1>Freight Estimate</h1>
    <p class="subtitle">PCG &amp; ISG IB Transport</p>
  </header>

  <form id="calcForm" onsubmit="return false;">
    <div class="form-grid">
      <div class="field required">
        <label>重量 (公斤) <span class="req">*</span></label>
        <input type="number" id="weight" min="0" step="0.01" required placeholder="输入重量">
      </div>
      <div class="field required">
        <label>体积 (CBM) <span class="req">*</span></label>
        <input type="number" id="volume" min="0" step="0.001" required placeholder="输入体积">
      </div>
      <div class="field required">
        <label>提货城市 <span class="req">*</span></label>
        <input type="text" id="city" list="cityList" required placeholder="输入或选择城市">
        <datalist id="cityList"></datalist>
      </div>
      <div class="field required">
        <label>板数 <span class="req">*</span> <span class="hint">（无板写0）</span></label>
        <input type="number" id="pallets" min="0" step="1" required placeholder="0">
      </div>
      <div class="field optional">
        <label>货值 (人民币) <span class="opt">选填</span></label>
        <input type="number" id="cargoValue" min="0" step="0.01" placeholder="选填">
      </div>
    </div>
    <button type="button" id="calcBtn" onclick="calculate()">查询运费</button>
  </form>

  <div id="results" class="results hidden">
    <h2>查询结果</h2>
    <div class="result-grid">
      <div class="result-card" id="ltlCard">
        <div class="card-title">零担运费</div>
        <div class="card-value" id="ltlResult">-</div>
        <div class="card-detail" id="ltlDetail"></div>
      </div>
      <div class="result-card" id="ftlCard">
        <div class="card-title">整车运费</div>
        <div class="card-value" id="ftlResult">-</div>
        <div class="card-detail" id="ftlDetail"></div>
      </div>
      <div class="result-card" id="domCard">
        <div class="card-title">国内快递运费</div>
        <div class="card-value" id="domResult">-</div>
        <div class="card-detail" id="domDetail"></div>
      </div>
      <div class="result-card" id="intlCard">
        <div class="card-title">海外快递运费</div>
        <div class="card-value" id="intlResult">-</div>
        <div class="card-detail" id="intlDetail"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 SSG-ISS &middot; PCG &amp; ISG IB Transport</p>
  </footer>
</div>

// ===== HELPER: find SF city (supports slash-separated keys) =====
function findSfCity(city){
  if(sfData[city]) return sfData[city];
  for(const k in sfData){
    if(k.includes('/')){
      const parts=k.split('/');
      if(parts.some(p=>p===city)) return sfData[k];
    }
  }
  return null;
}

// ===== MAIN CALCULATION =====
function calculate(){
  const weight=parseFloat(document.getElementById('weight').value);
  const volume=parseFloat(document.getElementById('volume').value);
  const city=document.getElementById('city').value.trim();
  const pallets=parseInt(document.getElementById('pallets').value);
  const cargoValueStr=document.getElementById('cargoValue').value.trim();
  const cargoValue=cargoValueStr?parseFloat(cargoValueStr):null;

  if(isNaN(weight)||isNaN(volume)||!city||isNaN(pallets)){
    alert('请填写所有必填项');return;
  }

  document.getElementById('results').classList.remove('hidden');

  // 1. 零担运费
  calcLTL(weight,volume,city);
  // 2. 整车运费
  calcFTL(pallets,city);
  // 3. 国内快递
  calcDomestic(weight,volume,city,cargoValue);
  // 4. 海外快递
  calcIntl(weight,volume);
}

function calcLTL(weight,volume,city){
  const el=document.getElementById('ltlResult');
  const det=document.getElementById('ltlDetail');
  const d=ltlData[city];
  if(!d){el.textContent='该城市无零担数据';el.className='card-value error';det.textContent='';return;}
  const chargeWeight=Math.max(weight,volume*167);
  const theoryBase=d.rate*chargeWeight;
  const actualBase=Math.max(theoryBase,d.min);
  const extra=d.extra||0;
  const total=actualBase+extra;
  el.className='card-value';
  el.textContent='¥ '+total.toFixed(2);
  det.innerHTML='计费重量: '+chargeWeight.toFixed(2)+'kg | 费率: '+d.rate+'/kg<br>基础运费: ¥'+actualBase.toFixed(2)+(extra?' | 额外: ¥'+extra:'');
}

function calcFTL(pallets,city){
  const el=document.getElementById('ftlResult');
  const det=document.getElementById('ftlDetail');
  if(pallets<=0){el.textContent='板数为0，不适用';el.className='card-value error';det.textContent='';return;}
  const vehicle=getPalletVehicle(pallets);
  if(!vehicle){el.textContent='板数超出范围(最大32)';el.className='card-value error';det.textContent='';return;}
  const vData=ftlData[vehicle];
  if(!vData||!(city in vData)){el.textContent='该城市无整车数据';el.className='card-value error';det.textContent='车型: '+vehicle;return;}
  const price=vData[city];
  if(price==='/'||price===null||price===undefined){el.textContent='该线路不可用';el.className='card-value error';det.textContent='车型: '+vehicle;return;}
  el.className='card-value';
  el.textContent='¥ '+Number(price).toFixed(2);
  det.textContent='车型: '+vehicle+' | '+pallets+'板';
}

function calcDomestic(weight,volume,city,cargoValue){
  const el=document.getElementById('domResult');
  const det=document.getElementById('domDetail');
  const expressWeight=Math.max(weight,volume*1000/6);
  const d=findSfCity(city);
  if(!d){el.textContent='该城市无快递数据';el.className='card-value error';det.textContent='';return;}
  let total=0;
  let formula='';
  if(expressWeight<=20){
    total=d.first;
    formula='首重计费 (≤20kg)';
  }else if(expressWeight<=60){
    total=d.first+(expressWeight-20)*d.cont1;
    formula='首重+续重1 (20-60kg)';
  }else{
    total=d.first+40*d.cont1+(expressWeight-60)*d.cont2;
    formula='首重+续重1+续重2 (>60kg)';
  }
  total=Math.round(total*100)/100;
  el.className='card-value';
  el.textContent='¥ '+total.toFixed(2);
  let note='快递计费重量: '+expressWeight.toFixed(2)+'kg | '+formula;
  if(cargoValue===null){
    note+='<br><span style="color:#e53e3e">* 未填货值，结果不包含保费</span>';
  }
  det.innerHTML=note;
}

function calcIntl(weight,volume){
  const el=document.getElementById('intlResult');
  const det=document.getElementById('intlDetail');
  const expressWeight=Math.max(weight,volume*1000/6);

  // 越南=ZONE5(index4), 美国=ZONE6(index5)
  function calcDHL(zoneIdx,zoneName){
    if(expressWeight<=30){
      // 找最近的0.5档
      let w=Math.ceil(expressWeight*2)/2;
      if(w<0.5) w=0.5;
      if(w>30) w=30;
      const prices=dhlFirst[w];
      if(!prices) return {cost:null,note:'重量超出首重范围'};
      return {cost:prices[zoneIdx],note:zoneName+' 首重 '+w+'kg'};
    }else{
      // 首30kg + 续重
      const base30=dhlFirst[30][zoneIdx];
      let cost=base30;
      let note=zoneName+' 首重30kg: $'+base30.toFixed(2);
      const remain=expressWeight-30;
      if(expressWeight<=70){
        cost+=remain*dhlCont1[zoneIdx];
        note+=' + 续重1 '+(remain).toFixed(1)+'kg×$'+dhlCont1[zoneIdx];
      }else if(expressWeight<=300){
        cost+=40*dhlCont1[zoneIdx];
        cost+=(expressWeight-70)*dhlCont2[zoneIdx];
        note+=' + 续重1 40kg + 续重2 '+(expressWeight-70).toFixed(1)+'kg';
      }else{
        cost+=40*dhlCont1[zoneIdx];
        cost+=230*dhlCont2[zoneIdx];
        cost+=(expressWeight-300)*dhlCont3[zoneIdx];
        note+=' + 续重1 40kg + 续重2 230kg + 续重3 '+(expressWeight-300).toFixed(1)+'kg';
      }
      return {cost:Math.round(cost*100)/100,note:note};
    }
  }

  const vn=calcDHL(4,'越南ZONE5');
  const us=calcDHL(5,'美国ZONE6');

  el.className='card-value';
  let html='';
  if(vn.cost!==null) html+='越南: $'+vn.cost.toFixed(2);
  if(us.cost!==null) html+=(html?' | ':'')+'美国: $'+us.cost.toFixed(2);
  if(!html) html='无法计算';
  el.innerHTML=html;
  det.innerHTML='快递计费重量: '+expressWeight.toFixed(2)+'kg<br>'+vn.note+'<br>'+us.note;
}
</script>
